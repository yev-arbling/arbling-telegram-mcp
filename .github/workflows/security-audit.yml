name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install .

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (fresh resolve of pyproject ranges)
        run: pip-audit --strict --desc

      # The step above audits what a fresh resolve of pyproject.toml's open
      # ranges would install — NOT what actually ships. The Docker image
      # installs the pinned closure from requirements-lock.txt, so audit that
      # artifact explicitly; a stale-but-in-range pin would otherwise pass CI
      # while the deployed image carries known CVEs.
      - name: Run pip-audit (deployed lockfile)
        run: pip-audit --strict --desc --no-deps -r requirements-lock.txt
