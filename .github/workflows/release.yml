name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write   # required for OIDC Trusted Publishing

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/arbling-telegram-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password needed — uses OIDC Trusted Publishing.
        # One-time setup: https://pypi.org/manage/project/arbling-telegram-mcp/settings/publishing/
        # Add publisher: owner=yev-arbling repo=arbling-telegram-mcp workflow=release.yml env=pypi
